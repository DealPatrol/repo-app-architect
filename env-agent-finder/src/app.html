<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>env-agent-finder</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --text: #e4e4ef;
    --muted: #8888a0;
    --accent: #6366f1;
    --accent2: #818cf8;
    --green: #22c55e;
    --red: #ef4444;
    --orange: #f59e0b;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px;
  }

  header {
    text-align: center;
    padding: 40px 0 32px;
  }

  header h1 {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }

  header p {
    color: var(--muted);
    font-size: 15px;
  }

  .scan-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 24px;
  }

  .scan-box label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .input-row {
    display: flex;
    gap: 10px;
  }

  .input-row input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-row input:focus {
    border-color: var(--accent);
  }

  .input-row input::placeholder {
    color: var(--muted);
    opacity: 0.6;
  }

  .btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn:hover { background: var(--accent2); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-sm {
    padding: 6px 14px;
    font-size: 12px;
    border-radius: 6px;
  }

  .btn-green { background: var(--green); }
  .btn-green:hover { background: #16a34a; }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-outline:hover { background: var(--surface2); }

  .loading {
    text-align: center;
    padding: 40px;
    color: var(--muted);
  }

  .loading .spinner {
    display: inline-block;
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results */
  .results { display: none; }
  .results.visible { display: block; }

  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }

  .section-header:hover { background: var(--surface2); }

  .section-header h2 {
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-header .count {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }

  .section-body { padding: 0; }
  .section-body.collapsed { display: none; }

  /* Meta grid */
  .meta-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1px;
    background: var(--border);
  }

  .meta-item {
    background: var(--surface);
    padding: 14px 20px;
  }

  .meta-item .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .meta-item .value {
    font-size: 14px;
    font-weight: 600;
  }

  /* Env var rows */
  .env-row {
    display: grid;
    grid-template-columns: 1fr 160px 200px 80px;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .env-row:last-child { border-bottom: none; }

  .env-name {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-weight: 600;
    font-size: 13px;
    word-break: break-all;
  }

  .env-service {
    color: var(--muted);
    font-size: 12px;
  }

  .env-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--text);
    font-size: 12px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    width: 100%;
    outline: none;
  }

  .env-input:focus { border-color: var(--accent); }
  .env-input.has-value { border-color: var(--green); background: rgba(34, 197, 94, 0.05); }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-align: center;
    white-space: nowrap;
  }

  .badge-green { background: rgba(34,197,94,0.12); color: var(--green); }
  .badge-red { background: rgba(239,68,68,0.12); color: var(--red); }
  .badge-gray { background: rgba(136,136,160,0.12); color: var(--muted); }

  /* Service cards */
  .svc-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
  }

  .svc-row:last-child { border-bottom: none; }

  .svc-info { flex: 1; }

  .svc-name {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 2px;
  }

  .svc-cat {
    font-size: 12px;
    color: var(--muted);
  }

  .confidence-bar {
    width: 80px;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
    margin-right: 16px;
  }

  .confidence-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.3s;
  }

  /* API routes */
  .route-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .route-row:last-child { border-bottom: none; }

  .route-path {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-weight: 500;
    flex: 1;
  }

  .method-tag {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  .method-GET { background: rgba(34,197,94,0.15); color: var(--green); }
  .method-POST { background: rgba(99,102,241,0.15); color: var(--accent2); }
  .method-PUT, .method-PATCH { background: rgba(245,158,11,0.15); color: var(--orange); }
  .method-DELETE { background: rgba(239,68,68,0.15); color: var(--red); }

  /* Actions bar */
  .actions-bar {
    display: flex;
    gap: 10px;
    justify-content: center;
    padding: 24px 0;
    flex-wrap: wrap;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--green);
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    z-index: 100;
  }

  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  @media (max-width: 700px) {
    .env-row {
      grid-template-columns: 1fr;
      gap: 6px;
    }
    .input-row { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>env-agent-finder</h1>
    <p>Scan any project. Find every env variable. Fill in the values. Get your .env.local.</p>
  </header>

  <div class="scan-box">
    <label>Project Path</label>
    <div class="input-row">
      <input type="text" id="pathInput" placeholder="/path/to/your/project" autocomplete="off" />
      <button class="btn" id="scanBtn" onclick="runScan()">Scan Project</button>
    </div>
  </div>

  <div id="loading" class="loading" style="display:none;">
    <div class="spinner"></div>
    <div>Scanning project...</div>
  </div>

  <div id="results" class="results">
    <!-- Project Info -->
    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">
        <h2>📦 Project Info</h2>
      </div>
      <div class="section-body">
        <div class="meta-grid" id="metaGrid"></div>
      </div>
    </div>

    <!-- Env Variables -->
    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">
        <h2>🔑 Environment Variables <span class="count" id="envCount">0</span></h2>
      </div>
      <div class="section-body" id="envBody"></div>
    </div>

    <!-- Services -->
    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">
        <h2>🔌 Detected Services <span class="count" id="svcCount">0</span></h2>
      </div>
      <div class="section-body" id="svcBody"></div>
    </div>

    <!-- API Routes -->
    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">
        <h2>🌐 API Routes <span class="count" id="routeCount">0</span></h2>
      </div>
      <div class="section-body" id="routeBody"></div>
    </div>

    <!-- Actions -->
    <div class="actions-bar">
      <button class="btn btn-green" onclick="autoFill()">⚡ Auto-Fill Secrets</button>
      <button class="btn" onclick="downloadEnv()">📥 Download .env.local</button>
      <button class="btn btn-outline" onclick="saveToProject()">💾 Save to Project</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let scanData = null;
let scanPath = "";

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

function toggleSection(header) {
  const body = header.nextElementSibling;
  body.classList.toggle("collapsed");
}

async function runScan() {
  const pathVal = document.getElementById("pathInput").value.trim();
  if (!pathVal) return;

  scanPath = pathVal;
  document.getElementById("loading").style.display = "block";
  document.getElementById("results").classList.remove("visible");
  document.getElementById("scanBtn").disabled = true;

  try {
    const res = await fetch("/api/scan", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ path: pathVal }),
    });

    const data = await res.json();

    if (data.error) {
      alert("Error: " + data.error);
      return;
    }

    scanData = data;
    renderResults(data);
    document.getElementById("results").classList.add("visible");
  } catch (err) {
    alert("Failed to connect to server: " + err.message);
  } finally {
    document.getElementById("loading").style.display = "none";
    document.getElementById("scanBtn").disabled = false;
  }
}

function renderResults(data) {
  renderMeta(data.meta);
  renderEnvVars(data.envVars);
  renderServices(data.services);
  renderRoutes(data.apiRoutes);
}

function renderMeta(meta) {
  const grid = document.getElementById("metaGrid");
  const items = [
    ["Name", meta.name || "—"],
    ["Framework", meta.framework || "—"],
    ["Language", meta.language || "—"],
    ["Package Manager", meta.packageManager || "—"],
    ["Docker", meta.hasDocker ? "Yes" : "No"],
    ["CI/CD", meta.hasCI ? "Yes" : "No"],
  ];

  grid.innerHTML = items.map(([label, value]) => `
    <div class="meta-item">
      <div class="label">${label}</div>
      <div class="value">${value}</div>
    </div>
  `).join("");
}

function renderEnvVars(envVars) {
  document.getElementById("envCount").textContent = envVars.length;
  const body = document.getElementById("envBody");

  if (envVars.length === 0) {
    body.innerHTML = '<div style="padding:20px;color:var(--muted);text-align:center;">No environment variables detected.</div>';
    return;
  }

  body.innerHTML = envVars.map((v, i) => {
    const currentVal = v.value || "";
    const hasVal = currentVal.length > 0;
    const badge = hasVal
      ? '<span class="badge badge-green">✓ Set</span>'
      : v.required === false
        ? '<span class="badge badge-gray">Optional</span>'
        : '<span class="badge badge-red">Missing</span>';

    return `
      <div class="env-row">
        <div>
          <div class="env-name">${v.name}</div>
          <div class="env-service">${v.service || ""}</div>
        </div>
        <div>${badge}</div>
        <input class="env-input ${hasVal ? "has-value" : ""}"
               type="text"
               data-var="${v.name}"
               value="${escapeHtml(currentVal)}"
               placeholder="Enter value..."
               oninput="onValueChange(this, ${i})" />
        <div style="font-size:11px;color:var(--muted);">${v.references ? v.references.length + " refs" : ""}</div>
      </div>
    `;
  }).join("");
}

function renderServices(services) {
  document.getElementById("svcCount").textContent = services.length;
  const body = document.getElementById("svcBody");

  if (services.length === 0) {
    body.innerHTML = '<div style="padding:20px;color:var(--muted);text-align:center;">No external services detected.</div>';
    return;
  }

  body.innerHTML = services.map(svc => `
    <div class="svc-row">
      <div class="svc-info">
        <div class="svc-name">${svc.name}</div>
        <div class="svc-cat">${svc.category}${svc.matchedPackages.length ? " · " + svc.matchedPackages.join(", ") : ""}</div>
      </div>
      <div class="confidence-bar">
        <div class="confidence-fill" style="width:${svc.confidence}%"></div>
      </div>
      <a href="${svc.docs}" target="_blank" class="btn btn-sm btn-outline">Docs ↗</a>
    </div>
  `).join("");
}

function renderRoutes(routes) {
  document.getElementById("routeCount").textContent = routes.length;
  const body = document.getElementById("routeBody");

  if (routes.length === 0) {
    body.innerHTML = '<div style="padding:20px;color:var(--muted);text-align:center;">No API routes detected.</div>';
    return;
  }

  body.innerHTML = routes.map(r => `
    <div class="route-row">
      <span class="route-path">${r.path}</span>
      ${r.methods.map(m => `<span class="method-tag method-${m}">${m}</span>`).join("")}
    </div>
  `).join("");
}

function onValueChange(input, idx) {
  const val = input.value.trim();
  if (val) {
    input.classList.add("has-value");
  } else {
    input.classList.remove("has-value");
  }
  if (scanData && scanData.envVars[idx]) {
    scanData.envVars[idx].value = val;
  }
}

function generateRandomSecret(len = 48) {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789_-";
  let result = "";
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  for (let i = 0; i < len; i++) result += chars[arr[i] % chars.length];
  return result;
}

const AUTO_FILL_MAP = {
  NEXTAUTH_SECRET: () => generateRandomSecret(48),
  AUTH_SECRET: () => generateRandomSecret(48),
  JWT_SECRET: () => generateRandomSecret(48),
  APP_SECRET: () => generateRandomSecret(48),
  SESSION_SECRET: () => generateRandomSecret(48),
  COOKIE_SECRET: () => generateRandomSecret(48),
  ENCRYPTION_KEY: () => generateRandomSecret(32),
  SECRET_KEY: () => generateRandomSecret(48),
  API_SECRET: () => generateRandomSecret(48),
  NEXTAUTH_URL: () => "http://localhost:3000", // pragma: allowlist secret
  NEXT_PUBLIC_APP_URL: () => "http://localhost:3000", // pragma: allowlist secret
  APP_URL: () => "http://localhost:3000", // pragma: allowlist secret
  DATABASE_URL: () => "postgresql://postgres:postgres@localhost:5432/app_dev",
  POSTGRES_URL: () => "postgresql://postgres:postgres@localhost:5432/app_dev",
  PG_CONNECTION_STRING: () => "postgresql://postgres:postgres@localhost:5432/app_dev",
  MYSQL_URL: () => "mysql://root:root@localhost:3306/app_dev",
  MONGODB_URI: () => "mongodb://localhost:27017/app_dev",
  MONGO_URL: () => "mongodb://localhost:27017/app_dev",
  REDIS_URL: () => "redis://localhost:6379",
};

function autoFill() {
  if (!scanData) return;
  let filled = 0;

  document.querySelectorAll(".env-input").forEach((input, idx) => {
    const name = input.dataset.var;
    if (input.value.trim()) return;

    const generator = AUTO_FILL_MAP[name];
    if (generator) {
      const val = generator();
      input.value = val;
      input.classList.add("has-value");
      if (scanData.envVars[idx]) scanData.envVars[idx].value = val;
      filled++;
    }
  });

  showToast(`⚡ Auto-filled ${filled} value(s)`);
}

function getUserValues() {
  const values = {};
  document.querySelectorAll(".env-input").forEach(input => {
    const val = input.value.trim();
    if (val) values[input.dataset.var] = val;
  });
  return values;
}

async function downloadEnv() {
  if (!scanData) return;

  const res = await fetch("/api/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      envVars: scanData.envVars,
      services: scanData.services,
      userValues: getUserValues(),
    }),
  });

  const data = await res.json();
  if (data.error) return alert(data.error);

  const blob = new Blob([data.content], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = ".env.local";
  a.click();

  showToast("📥 Downloaded .env.local");
}

async function saveToProject() {
  if (!scanData || !scanPath) return;

  const res = await fetch("/api/save", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      targetDir: scanPath,
      envVars: scanData.envVars,
      services: scanData.services,
      userValues: getUserValues(),
    }),
  });

  const data = await res.json();
  if (data.error) return alert(data.error);

  showToast("💾 Saved to " + data.path);
}

function escapeHtml(str) {
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

document.getElementById("pathInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") runScan();
});
</script>

</body>
</html>
